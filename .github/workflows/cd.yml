name: Civic 24 Continuous Integration / Continuous Deployment (CI/CD)

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  FLUTTER_VERSION: "3.38.7"

jobs:
  build-ios:
    name: Build iOS - ${{ matrix.app }} ${{ matrix.flavor }}
    runs-on: macos-15

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: citizen
            flavor: development

    env:
      FLUTTER_VERSION: "3.38.7"
      cwd: code/apps/${{ matrix.app }}

    steps:
      - name: 📚 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: code

      - name: ☕ Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: "18.x"

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: 📦 Install Melos & bootstrap
        run: |
          dart pub global activate melos
          melos bootstrap
        working-directory: code

      - name: 🧬 Run code generation
        run: melos run flutter:build
        working-directory: code

      - name: ✨ Analyze code
        run: melos run flutter:analyze
        working-directory: code

      # 🔐 Decode Secrets
      - name: 🔐 Decode secrets JSON
        working-directory: ${{ env.cwd }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p secrets
          SECRET_VALUE="${{ secrets[format('ENCODED_DEVELOPMENT_JSON_CITIZEN', matrix.app)] }}"
          [ -z "$SECRET_VALUE" ] && echo "Missing Base64 secret" && exit 1

          printf '%s' "$SECRET_VALUE" | base64 --decode > secrets/development.json
          python -m json.tool secrets/development.json >/dev/null

      # 🧹 Clean iOS Pods
      - name: 🧹 Reset iOS Pods
        working-directory: ${{ env.cwd }}/ios
        run: |
          rm -rf Pods Podfile.lock

      # 📦 Install Dart dependencies
      - name: 📦 Flutter pub get
        working-directory: ${{ env.cwd }}
        run: flutter pub get

      # 🔥 Install FlutterFire CLI
      - name: 🔥 Install FlutterFire CLI
        run: |
          dart pub global activate flutterfire_cli
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      # 📱 Build IPA
      - name: 📱 Build iOS IPA (unsigned)
        working-directory: ${{ env.cwd }}
        run: |
          flutter build ipa \
            --no-codesign \
            --flavor development \
            --dart-define-from-file=secrets/development.json

      # 🚀 Upload Artifact
      - name: 🚀 Upload iOS IPA to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ env.cwd }}/build/ios/ipa/*.ipa
          tag: ${{ matrix.app }}-${{ matrix.flavor }}-v1.0.${{ github.run_number }}
          token: ${{ secrets.TOKEN }}
          allowUpdates: true
          replacesArtifacts: false

  build-android:
    name: Build Android - ${{ matrix.app }} ${{ matrix.flavor }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: citizen
            flavor: development

    env:
      cwd: code/apps/${{ matrix.app }}

    steps:
      - name: 📚 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: code

      - name: ☕ Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: "18.x"

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: 📦 Install Melos & bootstrap
        run: |
          dart pub global activate melos
          melos bootstrap
        working-directory: code

      - name: 🧬 Run code generation
        run: melos run flutter:build
        working-directory: code

      - name: ✨ Analyze code
        run: melos run flutter:analyze
        working-directory: code

      # 🔐 Decode Secrets
      - name: 🔐 Decode secrets JSON
        working-directory: ${{ env.cwd }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p secrets
          SECRET_VALUE="${{ secrets[format('ENCODED_DEVELOPMENT_JSON_CITIZEN', matrix.app)] }}"
          if [ -z "$SECRET_VALUE" ]; then
            echo "Missing Base64 secret" && exit 1
          fi

          printf '%s' "$SECRET_VALUE" | \
            (base64 --decode 2>/dev/null || base64 -d 2>/dev/null || python -c "import sys,base64;sys.stdout.buffer.write(base64.b64decode(sys.stdin.read()))") \
            > secrets/development.json

          python -m json.tool secrets/development.json >/dev/null

      # ---- Android Build ----
      - name: Build Android Release APKs
        working-directory: ${{ env.cwd }}
        run: |
          flutter pub get
          flutter build apk \
            --release \
            --flavor development \
            --target lib/main.dart \
            --dart-define-from-file=secrets/development.json \
            --split-per-abi

      # 🚀 Upload Artifact
      - name: 🚀 Upload Android APKs to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ env.cwd }}/build/app/outputs/apk/release/*.apk"
          tag: ${{ matrix.app }}-${{ matrix.flavor }}-v1.0.${{ github.run_number }}
          token: ${{ secrets.TOKEN }}
          allowUpdates: true
          replacesArtifacts: false
